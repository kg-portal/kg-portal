{% extends "base.html" %}

{% block content %}

<!-- HEADER -->
<div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
">
    <div>
        <h1 style="font-size:28px; font-weight:800; margin-bottom:6px;">
            Business Overview
        </h1>
        <div style="color:#64748b;">
            Live-Übersicht · monatliche Entwicklung
        </div>
    </div>
</div>

<!-- KPI CARDS -->
<div style="
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:20px;
    margin-bottom:30px;
">
    <div style="background:linear-gradient(135deg,#2563eb,#1e40af); color:#fff; border-radius:18px; padding:22px;">
        <div style="opacity:.8; font-size:14px;">Monatlicher Umsatz</div>
        <div style="font-size:28px; font-weight:800; margin-top:8px;">€ 8.420</div>
    </div>

    <div style="background:#ffffff; border-radius:18px; padding:22px; border:1px solid #e5e7eb;">
        <div style="color:#64748b; font-size:14px;">Aktive Kunden</div>
        <div style="font-size:28px; font-weight:800; margin-top:8px; color:#111827;">14</div>
    </div>

    <div style="background:#ffffff; border-radius:18px; padding:22px; border:1px solid #e5e7eb;">
        <div style="color:#64748b; font-size:14px;">Ø Umsatz / Kunde</div>
        <div style="font-size:28px; font-weight:800; margin-top:8px; color:#111827;">€ 601</div>
    </div>
</div>

<!-- GRAPH CARD -->
<div style="
    background:#ffffff;
    border-radius:24px;
    padding:30px;
    border:1px solid #e5e7eb;
">
    <div style="font-weight:700; margin-bottom:15px;">
        Umsatzentwicklung
    </div>

    <canvas id="overviewChart" height="120"></canvas>
</div>

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const ctx = document.getElementById('overviewChart').getContext('2d');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Jan','Feb','Mär','Apr','Mai','Jun'],
        datasets: [{
            data: [4200, 5100, 4800, 6200, 7100, 8420],
            borderColor: '#2563eb',
            backgroundColor: 'rgba(37,99,235,0.15)',
            tension: 0.45,
            fill: true,
            pointRadius: 5
        }]
    },
    options: {
        plugins: {
            legend: { display: false }
        },
        scales: {
            y: {
                ticks: {
                    callback: v => v + ' €'
                }
            }
        }
    }
});
</script>

{% endblock %}
